<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cherry-red: #e11d48;
    --lavender: #f3e8ff;
    --dark-lavender: #6b4e8a;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: linear-gradient(135deg, #e11d48 0%, #f3e8ff 100%);
    color: #4c1d95;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Cute Stars & Moons */
  .celestial {
    position: fixed;
    font-size: 1.4rem;
    opacity: 0.25;
    z-index: -1;
    animation: float 15s infinite linear;
  }

  @keyframes float {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-30px) rotate(20deg); }
  }

  header {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 15px rgba(225,29,72,0.2);
  }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.65rem;
    color: var(--cherry-red);
    font-weight: 700;
    letter-spacing: -1px;
  }

  .nav-left, .nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .icon-btn {
    width: 46px;
    height: 46px;
    background: white;
    border: 2px solid var(--cherry-red);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    cursor: pointer;
    transition: all 0.3s;
  }

  .icon-btn:hover {
    background: var(--cherry-red);
    color: white;
    transform: scale(1.1);
  }

  .hero {
    text-align: center;
    padding: 70px 20px 40px;
  }

  .hero-photo {
    width: 100%;
    max-width: 420px;
    border-radius: 50%;
    border: 18px solid #111;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    margin: 30px auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 24px;
    padding: 20px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(225,29,72,0.15);
  }

  .card-media {
    position: relative;
    padding-top: 100%;
  }

  .card-media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Glittery Black Frame */
  .card-media::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 7px solid #111;
    border-radius: 18px;
    box-shadow: 
      0 0 0 6px #4c1d95,
      0 0 15px rgba(76,29,149,0.6);
    z-index: 2;
    pointer-events: none;
  }

  .card-body {
    padding: 16px;
    text-align: center;
  }

  .add-btn {
    width: 100%;
    padding: 14px;
    background: var(--cherry-red);
    color: white;
    border: none;
    border-radius: 50px;
    font-weight: 600;
    margin-top: 8px;
    cursor: pointer;
  }

  .cod {
    font-size: 0.85rem;
    color: #6b4e8a;
    margin-top: 6px;
  }

  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(76,29,149,0.7);
    opacity: 0;
    pointer-events: none;
    transition: 0.4s;
    z-index: 200;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; bottom: 0;
    width: min(320px, 88vw);
    background: white;
    right: -100%;
    transition: 0.4s ease;
    z-index: 300;
    padding: 20px;
    overflow-y: auto;
  }
  .drawer.open { right: 0; }
</style>
</head>
<body>

<!-- Floating Celestial Decor -->
<div class="celestial" style="top:12%; left:8%;">🌙</div>
<div class="celestial" style="top:28%; left:82%; animation-delay:3s;">✦</div>
<div class="celestial" style="top:65%; left:15%; animation-delay:6s;">⭐</div>
<div class="celestial" style="top:82%; left:75%; animation-delay:2s;">🌟</div>

<header>
  <div class="nav-row">
    <!-- Left: Cart + COD -->
    <div class="nav-left">
      <button class="icon-btn" id="cartBtn">🛒</button>
      <span class="cod" style="font-size:0.9rem; font-weight:600;">COD Available</span>
    </div>

    <!-- Center: Logo -->
    <div class="logo">ECLIPSE by MH</div>

    <!-- Right: Menu -->
    <button class="icon-btn" id="menuBtn">☰</button>
  </div>
</header>

<div class="hero">
  <h1 style="font-size:2.8rem; color:#4c1d95; margin-bottom:12px;">Celestial Magic</h1>
  <p style="color:#6b4e8a; max-width:420px; margin:0 auto;">Handmade jewelry that brings stars to your everyday look</p>
  
  <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=900" 
       alt="Hero" class="hero-photo"
       onerror="this.src='https://picsum.photos/id/1015/800/800'">
</div>

<div class="grid" id="productGrid"></div>

<!-- Menu Drawer -->
<div class="drawer" id="menuDrawer">
  <h2 style="color:var(--cherry-red); margin-bottom:20px;">Collections</h2>
  <ul style="list-style:none; font-size:1.1rem; line-height:2.4;">
    <li>🌙 Arm Cuffs</li>
    <li>⭐ Bracelets</li>
    <li>✨ Necklaces</li>
    <li>🌹 Earrings</li>
    <li>🪐 Hair Accessories</li>
    <li>🌌 Bag Charms</li>
    <li>🔑 Keychains</li>
    <li>📖 Bookmarks</li>
  </ul>
</div>

<div class="scrim" id="scrim"></div>

<script>
const products = [
  {name:"Orbit Armcuff", price:1250, img:"https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=800"},
  {name:"Lily Butterfly", price:1650, img:"https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113&width=800"},
  {name:"Pink Crystal Butterfly", price:1350, img:"https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560&width=800"},
  {name:"Starlight Necklace", price:1950, img:"https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026&width=800"}
];

let cart = [];

function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-media">
        <img src="\( {p.img}" alt=" \){p.name}" onerror="this.src='https://picsum.photos/id/1015/600/600'">
      </div>
      <div class="card-body">
        <h3 style="margin-bottom:6px;">${p.name}</h3>
        <p style="color:var(--cherry-red); font-weight:700;">Rs. ${p.price}</p>
        <button class="add-btn" onclick="addToCart('${p.name}')">Add to Cart</button>
        <div class="cod">Cash on Delivery Available</div>
      </div>
    </div>
  `).join('');
}

window.addToCart = function(name) {
  cart.push(name);
  document.getElementById('cartBtn').style.animation = 'none';
  setTimeout(() => document.getElementById('cartBtn').style.animation = '', 10);
  alert(`${name} added to cart 💖`);
};

document.getElementById('cartBtn').addEventListener('click', () => {
  if(cart.length === 0) {
    alert("Your cart is empty 🌙");
  } else {
    const message = `Hello! I would like to order:\n${cart.join('\n')}\n\nCash on Delivery please.`;
    window.open(`https://wa.me/923425858425?text=${encodeURIComponent(message)}`, '_blank');
  }
});

document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('menuDrawer').classList.add('open');
  document.getElementById('scrim').classList.add('show');
});

document.getElementById('scrim').addEventListener('click', () => {
  document.getElementById('menuDrawer').classList.remove('open');
  document.getElementById('scrim').classList.remove('show');
});

renderProducts();
</script>
</body>
</html>
