<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">

<style>
  :root {
    --darkred: #5c1a2b;
    --deepred: #3f1320;
    --grey: #d1c7c2;
    --accent: #c8a0a8;
    --bg: #1c1618;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: #e8d9d4;
  }

  header {
    position: sticky;
    top: 0;
    background: rgba(28,22,24,0.96);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid #3f1320;
  }

  .nav {
    max-width: 1280px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.9rem;
    color: var(--accent);
    letter-spacing: -1px;
  }

  .nav-actions button {
    background: none;
    border: none;
    font-size: 1.6rem;
    color: #e8d9d4;
    cursor: pointer;
    padding: 8px;
    transition: transform 0.3s ease;
  }
  .nav-actions button:hover {
    transform: scale(1.15);
    color: var(--accent);
  }

  .hero {
    text-align: center;
    padding: 110px 20px 70px;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 3.4rem;
    color: #f0e4df;
    margin-bottom: 12px;
  }
  .hero p {
    color: #b89f9f;
    font-size: 1.15rem;
  }

  .hero-img {
    width: 100%;
    max-width: 420px;
    margin: 50px auto 0;
    border-radius: 50%;
    border: 3px solid #3f1320;
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .hero-img:hover {
    transform: scale(1.04) rotate(2deg);
    box-shadow: 0 30px 60px rgba(194, 38, 62, 0.4);
  }

  .section {
    max-width: 1280px;
    margin: 0 auto;
    padding: 80px 24px;
  }

  h2 {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    text-align: center;
    margin-bottom: 60px;
    color: #f0e4df;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 32px;
  }

  .card {
    background: #2a2022;
    border-radius: 20px;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
    border: 1px solid #3f1320;
  }

  .card:hover {
    transform: translateY(-14px) scale(1.02);
    box-shadow: 0 25px 50px rgba(92, 26, 43, 0.45);
  }

  .card-media {
    position: relative;
    padding-top: 100%;
    overflow: hidden;
  }

  .card-media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.7s ease;
  }

  .card:hover .card-media img {
    transform: scale(1.12);
  }

  /* Glittery Black Frame */
  .card-media::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 2px solid #3f1320;
    border-radius: 14px;
    z-index: 2;
    transition: all 0.4s ease;
  }

  .card:hover .card-media::after {
    border-color: #c8a0a8;
    box-shadow: 0 0 20px rgba(200, 160, 168, 0.3);
  }

  .card-body {
    padding: 24px;
    text-align: center;
  }

  .price {
    color: var(--accent);
    font-weight: 600;
    margin: 10px 0 18px;
  }

  .add-btn {
    width: 100%;
    padding: 14px 24px;
    background: transparent;
    border: 2px solid var(--accent);
    color: #e8d9d4;
    border-radius: 50px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.4s ease;
  }

  .add-btn:hover {
    background: var(--accent);
    color: #1c1618;
    transform: translateY(-2px);
  }

  .cod {
    font-size: 0.82rem;
    color: #9c7f7f;
    margin-top: 10px;
  }

  footer {
    text-align: center;
    padding: 70px 20px 40px;
    color: #9c7f7f;
    font-size: 0.9rem;
    border-top: 1px solid #3f1320;
  }
</style>
</head>
<body>

<header>
  <div class="nav">
    <button class="nav-actions" id="cartBtn">🛍️</button>
    <div class="logo">ECLIPSE by MH</div>
    <button class="nav-actions" id="menuBtn">☰</button>
  </div>
</header>

<section class="hero">
  <h1>Quietly Celestial</h1>
  <p>Minimal jewelry with a soulful touch</p>
  <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=900" 
       class="hero-img" alt="Hero">
</section>

<section class="section">
  <h2>Signature Collection</h2>
  <div class="grid" id="productGrid"></div>
</section>

<footer>
  © 2026 Eclipse by MH • Handmade in Pakistan<br>
  Cash on Delivery Available
</footer>

<script>
const products = [
  {id:1, name:"Orbit Armcuff", price:1250, img:"https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=800"},
  {id:2, name:"Lily Butterfly Armcuff", price:1650, img:"https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113&width=800"},
  {id:3, name:"Pink Crystal Butterfly", price:1350, img:"https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560&width=800"},
  {id:4, name:"Starlight Necklace", price:1950, img:"https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026&width=800"}
];

let cart = [];

function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-media">
        <img src="\( {p.img}" alt=" \){p.name}">
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="price">Rs. ${p.price}</div>
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        <div class="cod">Cash on Delivery</div>
      </div>
    </div>
  `).join('');
}

window.addToCart = function(id) {
  const item = products.find(p => p.id === id);
  cart.push(item);
  alert(`${item.name} added to cart`);
};

document.getElementById('cartBtn').addEventListener('click', () => {
  if (cart.length === 0) return alert("Your cart is empty.");
  let msg = "Hi! My order:\n";
  cart.forEach(i => msg += `- ${i.name} (Rs. ${i.price})\n`);
  window.open(`https://wa.me/923425858425?text=${encodeURIComponent(msg)}`, '_blank');
});

renderProducts();
</script>
</body>
</html>
