<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH — Handmade Celestial Jewelry</title>
<meta name="description" content="Handmade celestial accessories to elevate every look. Arm cuffs, bracelets, necklaces, earrings & more. Based in Pakistan.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --purple:#5e1b8c;
    --purple-deep:#2c0f4a;
    --purple-ink:#1f0a32;
    --pink:#ff4da6;
    --pink-hot:#ff6ec4;
    --pink-soft:#ffb3e0;
    --blush:#fff0f7;
    --cream:#fff9fb;
    --lavender:#f8e9ff;
    --line:#f0d4f0;
    --grad: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
    --ease: cubic-bezier(.22,.9,.32,1);
    --shadow: 0 12px 32px -12px rgba(94,27,140,.32);
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Manrope',sans-serif;
    background:var(--blush);
    color:var(--purple-ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  img{max-width:100%;display:block;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

  .eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;font-weight:700;color:var(--pink-hot);}
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:700;color:var(--purple-deep);line-height:1.05;}

  .container{max-width:1280px;margin:0 auto;padding:0 20px;}

  .announce{
    background:var(--purple-ink); color:var(--pink-soft); text-align:center;
    font-size:.78rem; letter-spacing:.04em; padding:10px 12px; font-weight:600;
  }

  header{
    position:sticky; top:0; z-index:60;
    background:rgba(255,249,251,.9);
    backdrop-filter:blur(16px);
    border-bottom:1px solid var(--line);
  }

  .nav-row{
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:14px 20px;
  }

  .nav-left{justify-self:start;}
  .nav-right{justify-self:end; display:flex; gap:8px;}

  .icon-btn{
    width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    transition:all .25s var(--ease);
  }
  .icon-btn:hover{background:var(--lavender); transform:scale(1.08);}

  .wordmark{
    justify-self:center; font-family:'Fraunces',serif; font-weight:700; font-size:clamp(1.25rem, 3.2vw, 1.8rem);
    color:var(--purple); display:flex; align-items:center; gap:8px;
  }
  .wordmark .by{font-style:italic; font-size:.65em; color:var(--pink-hot);}
  .wordmark .moon{
    width:11px; height:11px; background:var(--grad); border-radius:50%; position:relative;
    box-shadow:0 0 12px var(--pink);
  }

  .cart-count{
    position:absolute; top:-4px; right:-4px; background:var(--grad); color:#fff;
    font-size:.65rem; font-weight:800; width:18px; height:18px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }

  .scrim{position:fixed; inset:0; background:rgba(44,15,74,.5); opacity:0; pointer-events:none; z-index:70; transition:opacity .4s;}
  .scrim.show{opacity:1; pointer-events:auto;}

  .drawer{
    position:fixed; top:0; bottom:0; width:min(360px,90vw); z-index:80;
    transition:transform .5s var(--ease);
  }
  .drawer-left{left:0; transform:translateX(-105%); background:var(--purple-deep); color:#fff;}
  .drawer-left.open{transform:translateX(0);}
  .drawer-right{right:0; transform:translateX(105%); background:var(--cream); color:var(--purple-ink);}
  .drawer-right.open{transform:translateX(0);}

  .hero{
    display:grid; grid-template-columns:1fr 1fr; gap:48px; padding:80px 20px 60px; align-items:center;
  }
  .hero h1{font-size:clamp(2.8rem,6vw,4.8rem);}
  .hero h1 em{color:var(--pink-hot); font-style:italic;}

  .orbit-stage{position:relative; max-width:520px; margin:0 auto;}
  .eclipse-photo{
    width:82%; aspect-ratio:1/1; border-radius:50%; overflow:hidden; margin:0 auto;
    box-shadow:0 40px 80px -20px rgba(94,27,140,.55), 0 0 0 16px rgba(255,255,255,.8);
    border:12px solid transparent;
    background: linear-gradient(white,white) padding-box, var(--grad) border-box;
  }
  .eclipse-photo img{width:100%; height:100%; object-fit:cover; transition:transform .8s ease;}
  .eclipse-photo:hover img{transform:scale(1.08);}

  .grid{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:28px; padding:0 20px;
  }
  .card{
    background:var(--cream); border-radius:24px; overflow:hidden; border:1px solid var(--line);
    transition:all .4s var(--ease);
  }
  .card:hover{transform:translateY(-14px); box-shadow:var(--shadow);}

  .card-media{
    position:relative; aspect-ratio:1/1; overflow:hidden; background:var(--lavender);
  }
  .card-media img{
    width:100%; height:100%; object-fit:cover; transition:transform .7s ease;
  }
  .card:hover .card-media img{transform:scale(1.1);}

  /* Enhanced Pink-Purple Frame */
  .card-media::after{
    content:''; position:absolute; inset:0; z-index:2; pointer-events:none;
    border:8px solid transparent;
    background:linear-gradient(135deg, var(--purple), var(--pink-hot)) padding-box, 
                linear-gradient(135deg, var(--pink-soft), var(--purple)) border-box;
    border-radius:24px;
  }

  .card-body{padding:18px;}
  .add-btn{
    margin-top:12px; width:100%; padding:14px; border-radius:9999px;
    background:var(--lavender); color:var(--purple); font-weight:700;
  }
  .add-btn:hover{background:var(--grad); color:#fff;}

  @media (max-width: 980px){
    .hero{grid-template-columns:1fr; text-align:center;}
  }
</style>
</head>
<body>

<div class="announce">🌙 Free shipping on orders over Rs. 5,000 — Handmade in Pakistan 🌟</div>

<header>
  <div class="nav-row">
    <div class="nav-left">
      <button class="icon-btn cart-btn" id="cartBtn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--purple-deep)" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
    <a href="#top" class="wordmark">ECLIPSE <span class="moon"></span> <span class="by">by MH</span></a>
    <div class="nav-right">
      <button class="icon-btn hamburger" id="menuBtn">☰</button>
    </div>
  </div>
</header>

<main id="top">
  <section class="hero">
    <div>
      <p class="eyebrow">Handmade Celestial Jewelry</p>
      <h1>Elevate every look, <em>one eclipse at a time.</em></h1>
      <p>Delicate arm cuffs, starry charms & more — crafted with love in Pakistan.</p>
    </div>
    <div class="orbit-stage">
      <div class="eclipse-photo">
        <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628" alt="Orbit Armcuff" loading="eager">
      </div>
    </div>
  </section>

  <section id="products">
    <div class="container" style="text-align:center; margin-bottom:40px;">
      <h2>Featured Pieces</h2>
    </div>
    <div class="grid" id="productGrid"></div>
  </section>
</main>

<script>
const products = [
  {
    id: 'lily',
    name: 'Lily Butterfly Armcuff',
    price: 1600,
    img: 'https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113'
  },
  {
    id: 'orbit',
    name: 'Orbit Armcuff',
    price: 1000,
    img: 'https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628'
  },
  {
    id: 'crystal',
    name: 'Pink Crystal Butterfly',
    price: 1200,
    img: 'https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560'
  },
  {
    id: 'starlight',
    name: 'Starlight Necklace',
    price: 1850,
    img: 'https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026'
  }
];

let cart = [];

function renderProducts(){
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-media">
        <img src="\( {p.img}" alt=" \){p.name}" loading="lazy">
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <p style="color:var(--pink-hot);font-weight:700;">Rs. ${p.price}</p>
        <button class="add-btn" data-id="${p.id}">Add to Cart</button>
      </div>
    </div>
  `).join('');
}

document.addEventListener('click', e => {
  if(e.target.classList.contains('add-btn')){
    const id = e.target.getAttribute('data-id');
    const item = products.find(p => p.id === id);
    if(item){
      cart.push(item);
      document.getElementById('cartCount').textContent = cart.length;
      alert(`${item.name} added to cart!`);
    }
  }
});

document.getElementById('cartBtn').addEventListener('click', () => {
  if(cart.length === 0) alert("Your cart is empty 🌙");
  else alert(`Cart has ${cart.length} items. Ready for WhatsApp checkout!`);
});

renderProducts();
</script>
</body>
</html>
