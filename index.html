<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&amp;family=Playfair+Display:wght@700&amp;family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --cherry: #e11d48;
    --lavender: #f3e8ff;
    --deep: #3b1e5e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: linear-gradient(180deg, var(--lavender) 0%, #ffe4f0 100%);
    color: var(--deep);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Background Stars & Moons */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: 
      radial-gradient(circle at 15% 20%, rgba(227,29,72,0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 35%, rgba(59,30,94,0.1) 0%, transparent 50%);
    z-index: -1;
  }

  .floating {
    position: absolute;
    font-size: 2rem;
    opacity: 0.15;
    animation: float 25s infinite linear;
    z-index: -1;
  }

  @keyframes float {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(30px, -80px) rotate(25deg); }
  }

  header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(15px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #e11d48;
  }

  .nav-row {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2.1rem;
    color: var(--cherry);
    font-weight: 700;
    letter-spacing: -2px;
  }

  .nav-left { display: flex; align-items: center; gap: 12px; }
  .nav-right { display: flex; align-items: center; gap: 12px; }

  .icon-btn {
    width: 50px; height: 50px;
    border: 3px solid var(--cherry);
    color: var(--cherry);
    background: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    cursor: pointer;
    transition: 0.3s;
  }
  .icon-btn:hover {
    background: var(--cherry);
    color: white;
    transform: scale(1.12);
  }

  .hero {
    text-align: center;
    padding: 80px 20px 50px;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 3.2rem;
    color: var(--deep);
    line-height: 1.1;
  }

  .hero-img {
    max-width: 360px;
    width: 100%;
    border-radius: 50%;
    border: 22px solid #111;
    margin: 40px auto 0;
    box-shadow: 0 30px 60px rgba(59,30,94,0.35);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 28px;
    padding: 20px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .card {
    background: white;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 15px 40px rgba(225,29,72,0.18);
  }

  .card-media {
    position: relative;
    padding-top: 100%;
  }
  .card-media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Glittery Black Frame */
  .card-media::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 9px solid #111;
    border-radius: 20px;
    box-shadow: 0 0 25px #3b1e5e;
    z-index: 2;
  }

  .card-body {
    padding: 18px;
    text-align: center;
  }

  .add-btn {
    width: 100%;
    padding: 14px;
    background: var(--cherry);
    color: white;
    border: none;
    border-radius: 50px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  .cod {
    color: #6b4e8a;
    font-size: 0.85rem;
    margin-top: 6px;
  }

  /* Drawer */
  .scrim, .drawer {
    position: fixed;
    transition: all 0.4s ease;
  }
  .scrim {
    inset: 0;
    background: rgba(59,30,94,0.7);
    opacity: 0;
    pointer-events: none;
    z-index: 200;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }

  .drawer {
    top: 0; bottom: 0;
    width: min(340px, 88vw);
    background: white;
    right: -100%;
    z-index: 300;
    padding: 30px 20px;
  }
  .drawer.open { right: 0; }
</style>
</head>
<body>

<div class="floating" style="top:15%;left:10%;">🌙</div>
<div class="floating" style="top:45%;left:80%;animation-delay:4s;">✦</div>
<div class="floating" style="top:75%;left:20%;animation-delay:8s;">⭐</div>

<header>
  <div class="nav-row">
    <div class="nav-left">
      <button class="icon-btn" id="cartBtn">🛍️</button>
    </div>
    <div class="logo">ECLIPSE by MH</div>
    <button class="icon-btn" id="menuBtn">☰</button>
  </div>
</header>

<section class="hero">
  <h1>Moonlit Jewelry</h1>
  <p style="margin-top:12px; color:#6b4e8a;">Handmade with love in Pakistan</p>
  <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=900" 
       class="hero-img" alt="Hero">
</section>

<div class="grid" id="productGrid"></div>

<!-- Menu Drawer -->
<div class="drawer" id="menuDrawer">
  <h2 style="color:var(--cherry);margin-bottom:24px;">Collections</h2>
  <div style="line-height:2.8; font-size:1.15rem;">
    <div>🌙 Arm Cuffs</div>
    <div>⭐ Bracelets</div>
    <div>✨ Necklaces</div>
    <div>🌹 Earrings</div>
    <div>🪐 Hair Accessories</div>
    <div>🌌 Bag Charms</div>
    <div>🔑 Keychains</div>
  </div>
</div>

<div class="scrim" id="scrim"></div>

<script>
const products = [
  {id:1, name:"Orbit Armcuff", price:1250, img:"https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=800"},
  {id:2, name:"Lily Butterfly Armcuff", price:1650, img:"https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113&width=800"},
  {id:3, name:"Pink Crystal Butterfly", price:1350, img:"https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560&width=800"},
  {id:4, name:"Starlight Necklace", price:1950, img:"https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026&width=800"}
];

let cart = [];

function renderProducts() {
  document.getElementById('productGrid').innerHTML = products.map(p => `
    <div class="card">
      <div class="card-media">
        <img src="\( {p.img}" alt=" \){p.name}">
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <p style="color:var(--cherry);font-weight:700;margin:8px 0;">Rs. ${p.price}</p>
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        <div class="cod">💖 Cash on Delivery Available</div>
      </div>
    </div>
  `).join('');
}

window.addToCart = (id) => {
  const item = products.find(p => p.id === id);
  cart.push(item);
  alert(item.name + " added to cart 💕");
};

document.getElementById('cartBtn').addEventListener('click', () => {
  if(cart.length === 0) return alert("Cart is empty 🌙");
  
  let text = "Hello Eclipse by MH!\n\nMy order:\n";
  cart.forEach(item => text += `- \( {item.name} (Rs. \){item.price})\n`);
  text += "\nPlease confirm Cash on Delivery.";
  
  window.open(`https://wa.me/923425858425?text=${encodeURIComponent(text)}`, '_blank');
});

const menuBtn = document.getElementById('menuBtn');
const menuDrawer = document.getElementById('menuDrawer');
const scrim = document.getElementById('scrim');

menuBtn.addEventListener('click', () => {
  menuDrawer.classList.add('open');
  scrim.classList.add('show');
});

scrim.addEventListener('click', () => {
  menuDrawer.classList.remove('open');
  scrim.classList.remove('show');
});

renderProducts();
</script>
</body>
</html>
