<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">

<style>
  :root {
    --darkred: #5c1a2b;
    --deepred: #3f1320;
    --grey: #d1c7c2;
    --lightgrey: #f0e9e6;
    --bg: #1c1618;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: #e8d9d4;
    line-height: 1.6;
  }

  header {
    position: sticky;
    top: 0;
    background: rgba(28,22,24,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
    border-bottom: 1px solid #3f1320;
  }

  .nav {
    max-width: 1280px;
    margin: 0 auto;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 1.85rem;
    color: #c8a0a8;
    letter-spacing: -1px;
  }

  .nav-actions {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .icon {
    font-size: 1.5rem;
    cursor: pointer;
    padding: 8px;
    transition: 0.3s;
  }
  .icon:hover { color: #c8a0a8; }

  .hero {
    text-align: center;
    padding: 120px 20px 80px;
    max-width: 720px;
    margin: 0 auto;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 3.2rem;
    color: #e8d9d4;
    margin-bottom: 16px;
  }

  .hero p {
    font-size: 1.1rem;
    color: #b89f9f;
    max-width: 420px;
    margin: 0 auto;
  }

  .hero-img {
    width: 100%;
    max-width: 420px;
    margin: 60px auto 0;
    border-radius: 50%;
    border: 3px solid #3f1320;
    box-shadow: 0 20px 50px rgba(92,26,43,0.5);
  }

  .section {
    max-width: 1280px;
    margin: 0 auto;
    padding: 80px 24px;
  }

  h2 {
    font-family: 'Fraunces', serif;
    font-size: 2.1rem;
    text-align: center;
    margin-bottom: 50px;
    color: #e8d9d4;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 32px;
  }

  .card {
    background: #2a2022;
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.4s;
  }

  .card:hover {
    transform: translateY(-8px);
  }

  .card-media {
    position: relative;
    padding-top: 100%;
  }

  .card-media img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* Minimalist Black Frame */
  .card-media::after {
    content: '';
    position: absolute;
    inset: 12px;
    border: 2px solid #3f1320;
    border-radius: 12px;
    z-index: 2;
  }

  .card-body {
    padding: 24px;
    text-align: center;
  }

  .price {
    color: #c8a0a8;
    font-weight: 600;
    margin: 8px 0 16px;
  }

  .add-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 2px solid #c8a0a8;
    color: #e8d9d4;
    border-radius: 50px;
    font-weight: 500;
    cursor: pointer;
    transition: 0.3s;
  }

  .add-btn:hover {
    background: #c8a0a8;
    color: #1c1618;
  }

  .cod {
    font-size: 0.8rem;
    color: #8c7a7a;
    margin-top: 8px;
  }

  footer {
    text-align: center;
    padding: 60px 20px 40px;
    border-top: 1px solid #3f1320;
    color: #8c7a7a;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<header>
  <div class="nav">
    <button class="icon" id="cartBtn">🛍️</button>
    <div class="logo">ECLIPSE by MH</div>
    <button class="icon" id="menuBtn">☰</button>
  </div>
</header>

<section class="hero">
  <h1>Quietly Celestial</h1>
  <p>Minimalist jewelry inspired by the moon and stars. Handcrafted with intention.</p>
  <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=900" 
       class="hero-img" alt="Hero">
</section>

<section class="section">
  <h2>Signature Pieces</h2>
  <div class="grid" id="productGrid"></div>
</section>

<footer>
  © 2026 Eclipse by MH • Handmade in Pakistan<br>
  <span style="margin-top:12px;display:block;">Cash on Delivery Available</span>
</footer>

<script>
const products = [
  {id:1, name:"Orbit Armcuff", price:1250, img:"https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=800"},
  {id:2, name:"Lily Butterfly", price:1650, img:"https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113&width=800"},
  {id:3, name:"Pink Crystal", price:1350, img:"https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560&width=800"},
  {id:4, name:"Starlight Necklace", price:1950, img:"https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026&width=800"}
];

let cart = [];

function renderProducts() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="card">
      <div class="card-media">
        <img src="\( {p.img}" alt=" \){p.name}">
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <div class="price">Rs. ${p.price}</div>
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        <div class="cod">Cash on Delivery</div>
      </div>
    </div>
  `).join('');
}

window.addToCart = function(id) {
  const item = products.find(p => p.id === id);
  cart.push(item);
  alert(`${item.name} added to cart`);
};

document.getElementById('cartBtn').addEventListener('click', () => {
  if (cart.length === 0) return alert("Your cart is empty.");
  
  let message = "Hello! I'd like to order:\n";
  cart.forEach(item => message += `- ${item.name} (Rs. ${item.price})\n`);
  message += "\nCash on Delivery please.";
  
  window.open(`https://wa.me/923425858425?text=${encodeURIComponent(message)}`, '_blank');
});

renderProducts();
</script>
</body>
</html>
