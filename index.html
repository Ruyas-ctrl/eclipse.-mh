<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH • Celestial Jewelry</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&amp;family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --darkred: #8b1a2f;
    --deepred: #4a0f1f;
    --grey: #e5e5e5;
    --lightgrey: #f8f8f8;
    --accent: #c0263e;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Manrope', sans-serif;
    background: linear-gradient(180deg, #1a0f12 0%, #2c1a20 100%);
    color: #ddd;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background Stars & Moons */
  .celestial-bg {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: 
      radial-gradient(circle at 20% 30%, rgba(194,38,62,0.12) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(139,26,47,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: -1;
  }

  .floating {
    position: absolute;
    color: #c0263e;
    font-size: 1.8rem;
    opacity: 0.2;
    animation: drift 30s infinite linear;
    z-index: -1;
  }

  @keyframes drift {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-120px) rotate(30deg); }
  }

  header {
    background: rgba(26,15,18,0.95);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #4a0f1f;
  }

  .nav-row {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    color: #c0263e;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .icon-btn {
    width: 52px; height: 52px;
    background: #2c1a20;
    border: 2px solid #c0263e;
    color: #ddd;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .icon-btn:hover {
    background: #c0263e;
    color: white;
    transform: scale(1.1);
  }

  .hero {
    text-align: center;
    padding: 90px 20px 60px;
  }
  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: 3.1rem;
    color: #f1c4c4;
    text-shadow: 0 0 30px #c0263e;
  }

  .hero-img {
    max-width: 380px;
    width: 100%;
    border-radius: 50%;
    border: 22px solid #111;
    box-shadow: 0 30px 70px rgba(194,38,62,0.4);
    margin: 40px auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 28px;
    padding: 20px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .card {
    background: #2c1a20;
    border-radius: 24px;
    overflow: hidden;
    border: 1px solid #4a0f1f;
  }

  .card-media {
    position: relative;
    padding-top: 100%;
  }
  .card-media img {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* Glittery Black Frame */
  .card-media::after {
    content: '';
    position: absolute;
    inset: 14px;
    border: 8px solid #111;
    border-radius: 16px;
    box-shadow: 0 0 25px #c0263e;
    z-index: 2;
  }

  .card-body {
    padding: 20px;
    text-align: center;
  }

  .add-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50px;
    font-weight: 700;
    margin-top: 12px;
    cursor: pointer;
  }

  .cod {
    margin-top: 8px;
    font-size: 0.85rem;
    color: #c4a1a1;
  }

  /* Drawer */
  .scrim {
    position: fixed;
    inset: 0;
    background: rgba(26,15,18,0.85);
    opacity: 0;
    pointer-events: none;
    z-index: 200;
    transition: 0.4s;
  }
  .scrim.show { opacity: 1; pointer-events: auto; }

  .drawer {
    position: fixed;
    top: 0; bottom: 0;
    width: min(340px, 90vw);
    background: #1a0f12;
    color: #ddd;
    z-index: 300;
    right: -100%;
    transition: 0.4s ease;
    padding: 30px 20px;
  }
  .drawer.open { right: 0; }
</style>
</head>
<body>

<div class="celestial-bg"></div>
<div class="floating" style="top:15%;left:10%;">🌙</div>
<div class="floating" style="top:40%;left:80%;animation-delay:5s;">⭐</div>
<div class="floating" style="top:70%;left:25%;animation-delay:9s;">✦</div>

<header>
  <div class="nav-row">
    <div class="nav-left">
      <button class="icon-btn" id="cartBtn">🛍️</button>
    </div>
    <div class="logo">ECLIPSE by MH</div>
    <button class="icon-btn" id="menuBtn">☰</button>
  </div>
</header>

<section class="hero">
  <h1>Elegance in the Dark</h1>
  <p style="margin-top:16px; color:#c4a1a1;">Handcrafted celestial jewelry</p>
  <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=900" 
       class="hero-img" alt="Hero">
</section>

<div class="grid" id="productGrid"></div>

<!-- Menu Drawer -->
<div class="drawer" id="menuDrawer">
  <h2 style="color:#c0263e;margin-bottom:24px;">Collections</h2>
  <div style="line-height:2.8;font-size:1.1rem;">
    <div>🌙 Arm Cuffs</div>
    <div>⭐ Bracelets</div>
    <div>✨ Necklaces</div>
    <div>🌹 Earrings</div>
    <div>🪐 Hair Accessories</div>
    <div>🌌 Bag Charms</div>
  </div>
</div>

<div class="scrim" id="scrim"></div>

<script>
const products = [
  {id:1, name:"Orbit Armcuff", price:1250, img:"https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=800"},
  {id:2, name:"Lily Butterfly Armcuff", price:1650, img:"https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113&width=800"},
  {id:3, name:"Pink Crystal Butterfly", price:1350, img:"https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560&width=800"},
  {id:4, name:"Starlight Necklace", price:1950, img:"https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026&width=800"}
];

let cart = [];

function renderProducts() {
  document.getElementById('productGrid').innerHTML = products.map(p => `
    <div class="card">
      <div class="card-media">
        <img src="\( {p.img}" alt=" \){p.name}">
      </div>
      <div class="card-body">
        <h3>${p.name}</h3>
        <p style="color:#c0263e;font-weight:700;margin:10px 0;">Rs. ${p.price}</p>
        <button class="add-btn" onclick="addToCart(${p.id})">Add to Cart</button>
        <div class="cod">💳 Cash on Delivery Available</div>
      </div>
    </div>
  `).join('');
}

window.addToCart = function(id) {
  const item = products.find(p => p.id === id);
  cart.push(item);
  alert(item.name + " added to cart ✨");
};

document.getElementById('cartBtn').addEventListener('click', () => {
  if (cart.length === 0) return alert("Your cart is empty.");
  
  let msg = "Hi Eclipse by MH!\n\nI would like to order:\n";
  cart.forEach(item => msg += `- ${item.name} (Rs. ${item.price})\n`);
  msg += "\nCash on Delivery please.";
  
  window.open(`https://wa.me/923425858425?text=${encodeURIComponent(msg)}`, '_blank');
});

const menuBtn = document.getElementById('menuBtn');
const menuDrawer = document.getElementById('menuDrawer');
const scrim = document.getElementById('scrim');

menuBtn.addEventListener('click', () => {
  menuDrawer.classList.add('open');
  scrim.classList.add('show');
});

scrim.addEventListener('click', () => {
  menuDrawer.classList.remove('open');
  scrim.classList.remove('show');
});

renderProducts();
</script>
</body>
</html>
