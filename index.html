<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse by MH — Handmade Jewelry</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@400;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --purple:#5e1b8c;
    --pink:#ff4da6;
    --grad: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
  }

  body{
    font-family:'Manrope',sans-serif;
    background:#fff0f7;
    margin:0;
    padding:0;
  }

  .hero-photo, .product-img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:16px;
    border: 12px solid transparent;
    background: linear-gradient(white,white) padding-box, var(--grad) border-box;
    box-shadow: 0 20px 40px rgba(94,27,140,0.3);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    padding: 20px;
  }

  .card {
    background: white;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  .card-media {
    position: relative;
    padding-top: 100%;
  }

  .card-media img {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
</style>
</head>
<body>

<h1 style="text-align:center; padding:30px 20px; font-family:'Fraunces',serif; color:#5e1b8c;">
  Eclipse by MH
</h1>

<!-- Hero -->
<div style="max-width:800px; margin:40px auto; padding:0 20px;">
  <div class="card">
    <div class="card-media">
      <img src="https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=1000" 
           alt="Hero" class="hero-photo" onerror="this.src='https://picsum.photos/id/1015/800/800'">
    </div>
  </div>
</div>

<!-- Products -->
<div class="grid" id="productGrid"></div>

<script>
const products = [
  {
    name: "Orbit Armcuff",
    price: 1000,
    img: "https://eclipsebyms.com/cdn/shop/files/0F2B7AC8-9E0A-4CCD-9B0F-16BB2CAEED77.jpg?v=1782044628&width=800"
  },
  {
    name: "Lily Butterfly Armcuff",
    price: 1600,
    img: "https://eclipsebyms.com/cdn/shop/files/C616A6F5-8FA8-4196-AA2C-17EA030B84B9.jpg?v=1782810113&width=800"
  },
  {
    name: "Pink Crystal Butterfly",
    price: 1200,
    img: "https://eclipsebyms.com/cdn/shop/files/93B3D48E-F2D3-4262-BDC9-56F63A98A599.jpg?v=1772128560&width=800"
  },
  {
    name: "Starlight Necklace",
    price: 1850,
    img: "https://eclipsebyms.com/cdn/shop/collections/20ed6f43053e7ac16d71eccdd06d6ff3_e19af08e-3eee-4c22-8f66-eb473d0816bb.jpg?v=1770193026&width=800"
  }
];

const grid = document.getElementById('productGrid');

products.forEach(product => {
  const cardHTML = `
    <div class="card">
      <div class="card-media">
        <img src="${product.img}" 
             alt="${product.name}" 
             class="product-img"
             onerror="this.src='https://picsum.photos/id/${Math.floor(Math.random()*100)+100}/600/600'; this.onerror=null;">
      </div>
      <div style="padding:16px; text-align:center;">
        <h3 style="margin:8px 0; color:#2c0f4a;">${product.name}</h3>
        <p style="color:#ff4da6; font-weight:bold;">Rs. ${product.price}</p>
        <button onclick="alert('${product.name} added to cart! 🌙')" 
                style="margin-top:12px; padding:12px 24px; background:linear-gradient(135deg,#5e1b8c,#ff4da6); color:white; border:none; border-radius:50px; cursor:pointer;">
          Add to Cart
        </button>
      </div>
    </div>
  `;
  grid.innerHTML += cardHTML;
});
</script>

</body>
</html>
